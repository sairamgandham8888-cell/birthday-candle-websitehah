<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 Blow the Candle</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
    color: #333;
}

.container {
    padding: 20px;
}

h1 {
    font-size: 28px;
}

input, button {
    padding: 10px;
    margin: 8px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

button {
    background: #ff4081;
    color: white;
}

.cake {
    margin-top: 30px;
}

.candle {
    width: 10px;
    height: 60px;
    background: #fff;
    margin: auto;
    position: relative;
}

.flame {
    width: 20px;
    height: 20px;
    background: orange;
    border-radius: 50%;
    position: absolute;
    top: -20px;
    left: -5px;
    box-shadow: 0 0 20px yellow;
    animation: flicker 0.2s infinite alternate;
}

@keyframes flicker {
    from { transform: scale(1); }
    to { transform: scale(1.2); }
}

.hidden {
    display: none;
}

#message {
    font-size: 22px;
    margin-top: 20px;
    color: green;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎂 Blow the Candle</h1>

    <input type="text" id="name" placeholder="Enter Name"><br>
    <input type="date" id="dob"><br>
    <button onclick="startApp()">Start</button>

    <div class="cake">
        <div class="candle">
            <div id="flame" class="flame"></div>
        </div>
    </div>

    <p id="message" class="hidden"></p>
</div>

<script>
let audioContext, analyser, microphone, dataArray;

function calculateAge(dob) {
    let birth = new Date(dob);
    let today = new Date();

    let age = today.getFullYear() - birth.getFullYear();
    let m = today.getMonth() - birth.getMonth();

    if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) {
        age--;
    }
    return age;
}

function startApp() {
    const name = document.getElementById("name").value;
    const dob = document.getElementById("dob").value;

    if (!name || !dob) {
        alert("Enter all details");
        return;
    }

    navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            microphone = audioContext.createMediaStreamSource(stream);

            analyser.fftSize = 256;
            let bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            microphone.connect(analyser);

            detectBlow(name, dob);
        })
        .catch(err => {
            alert("Mic permission required!");
        });
}

function detectBlow(name, dob) {
    analyser.getByteFrequencyData(dataArray);

    let volume = dataArray.reduce((a, b) => a + b) / dataArray.length;

    if (volume > 60) { // blowing threshold
        document.getElementById("flame").style.display = "none";

        let age = calculateAge(dob);

        let message = `🎉 Happy Birthday ${name}! 🎂<br>
                       You are now ${age} years old! 💖`;

        let msgBox = document.getElementById("message");
        msgBox.innerHTML = message;
        msgBox.classList.remove("hidden");

        return;
    }

    requestAnimationFrame(() => detectBlow(name, dob));
}
</script>

</body>
</html>
